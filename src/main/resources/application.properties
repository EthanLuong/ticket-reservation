spring.application.name=ticket-reservation

# JPA: schema is owned by Flyway. Fail startup if entities diverge.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# Actuator (keep minimal in main profile; expand per-env)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# JWT  dev placeholder; override per-env via env var APP_SECURITY_JWT_SECRET.
# Must be at least 256 bits (32 bytes) for HS256.
app.security.jwt.secret=${APP_SECURITY_JWT_SECRET:dev-only-secret-change-me-0123456789abcdef0123456789abcdef}
app.security.jwt.expiration-minutes=60
app.security.jwt.issuer=ticket-reservation

# Reservation hold duration (TTL before auto-expiry). Redis-native TTL — no sweeper.
app.reservation.hold-duration-minutes=10

# Redis (phase 1). Default targets local Docker compose; override SPRING_DATA_REDIS_URL
# for Upstash prod (rediss://...). Lettuce client; timeout short to fail-fast on outage.
spring.data.redis.url=${SPRING_DATA_REDIS_URL:redis://localhost:6379}
spring.data.redis.timeout=2000ms
spring.data.redis.client-type=lettuce
# Redis is used only via StringRedisTemplate + Redisson API — no @RedisHash entities.
# Disable Spring Data Redis repo scanning so the JPA repo interfaces stop producing
# "Could not safely identify store assignment" warnings at startup.
spring.data.redis.repositories.enabled=false

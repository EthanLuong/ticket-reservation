spring.application.name=ticket-reservation

# JPA: schema is owned by Flyway. Fail startup if entities diverge.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# Actuator (keep minimal in main profile; expand per-env)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# JWT  dev placeholder; override per-env via env var APP_SECURITY_JWT_SECRET.
# Must be at least 256 bits (32 bytes) for HS256.
app.security.jwt.secret=${APP_SECURITY_JWT_SECRET:dev-only-secret-change-me-0123456789abcdef0123456789abcdef}
app.security.jwt.expiration-minutes=60
app.security.jwt.issuer=ticket-reservation

# Reservation hold duration (TTL before auto-expiry)
app.reservation.hold-duration-minutes=10
# How often the TTL sweeper runs (fixedDelay, not fixedRate — sweeps never overlap)
app.reservation.sweep-interval-ms=5000
